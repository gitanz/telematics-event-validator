<div class="container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Login</mat-card-title>
    </mat-card-header>

    <mat-divider></mat-divider>

    <mat-card-content >
      <form [formGroup]="loginForm" (ngSubmit)="onLogin($event)">
        <mat-form-field class="form-field">
          <mat-label>Moderator ID</mat-label>
          <input matInput formControlName="moderatorId">
        </mat-form-field>

        <mat-form-field class="form-field">
          <mat-label>Location</mat-label>
          <mat-select formControlName="location">
            <mat-option value="North America">North America</mat-option>
            <mat-option value="Europe">Europe</mat-option>
            <mat-option value="Asia">Asia</mat-option>
            <mat-option value="South America">South America</mat-option>
            <mat-option value="Africa">Africa</mat-option>
            <mat-option value="Oceania">Oceania</mat-option>
          </mat-select>
        </mat-form-field>

        <div style="display: flex; justify-content: flex-end; margin-top: 20px;">
          <button mat-button mat-raised-button>
            Login
          </button>
        </div>
      </form>

    </mat-card-content>

  </mat-card>
</div>
